patch:
  "speller/algebra":
    __patch:
      - pinyin:/abbreviation
      - pinyin:/spelling_correction
      - pinyin:/key_correction
  speller/delimiter: "'"
  punctuator/import_preset: default
#  punctuator/import_preset: latexmath
#  recognizer/patterns:
#    punct: "^\([0-9]0?|[A-Za-z]+)$"
  punctuator/full_shape:
    "/" : "、"
  punctuator/half_shape:
    "/" : "、"
    # "\\": "\\"
    "\\" : [\,/,
      α,β,γ,δ,ε,ζ,η,θ,ι,κ,λ,μ,ν,ξ,ο,π,ρ,σ,τ,υ,φ,χ,ψ,ω,
      Α,Β,Γ,Δ,Ε,Ζ,Η,Θ,Ι,Κ,Λ,Μ,Ν,Ξ,Ο,Π,Ρ,Σ,Τ,Υ,Φ,Χ,Ψ,Ω,
      ÷]
  key_binder:
    bindings:
      - { when: composing, accept: semicolon, send: 2 }
      - { when: composing, accept: slash, send: 3 }
      - { when: paging, accept: minus, send: Page_Up }
      - { when: paging, accept: comma, send: Page_Up }
      - { when: has_menu, accept: period, send: Page_Down }
      - { when: has_menu, accept: equal, send: Page_Down }
      - { when: composing, accept: Tab, send: grave}
      # - { when: always, accept: Alt+F, toggle: traditionalization }
  ascii_composer/switch_key:
    # Shift_L: commit_code
    # Shift_R: commit_code
  switches:
    - name: ascii_mode
      states: ["中", "Ａ"]
      reset: 0
    - name: ascii_punct
      states: ["¥", "$"]
      reset: 0
    - name: traditionalization
      states: ["简", "繁"]
      reset: 0
    - name: emoji
      states: ["💀", "😄"]
      reset: 0
    - name: full_shape
      states: ["🌙", "🌕"]
      reset: 0
    - name: search_single_char
      states: ["正常", "單字"]
      reset: 0