patch:
  "speller/algebra":
    __patch:
      - pinyin:/abbreviation
      - pinyin:/spelling_correction
      - pinyin:/key_correction
  punctuator/import_preset: default
  punctuator/full_shape:
    "/" : "、"
  punctuator/half_shape:
    "/" : "、"
    "\\" : [\,/,÷]
  key_binder:
    bindings:
      - { when: composing, accept: semicolon, send: 2 }
      - { when: composing, accept: apostrophe, send: 3 }
      - { when: paging, accept: minus, send: Page_Up }
      - { when: paging, accept: comma, send: Page_Up }
      - { when: has_menu, accept: period, send: Page_Down }
      - { when: has_menu, accept: equal, send: Page_Down }
      # - { when: always, accept: "Control+Shift+f", toggle: traditionalization }
  ascii_composer/switch_key:
    Shift_L: commit_code
    Shift_R: commit_code